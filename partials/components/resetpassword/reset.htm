<form
		class="ui form"
		data-request="onResetPassword"
		data-request-success="alert('{{ 'You have successfully changed your password. Please login to the Internal Repository.'|_ }}');"
        data-request-redirect="/login"
    >
	<div class="fields">
		<div class="field">
<!--			<label for="resetCode">{{ 'Activation Code'|_ }}</label>-->
			<input name="code" type="text" id="resetCode" placeholder="{{ 'Enter the activation code'|_ }}" value="{{get('reset')}}">
		</div>

		<div class="field">
<!--			<label for="resetPassword">{{ 'New Password'|_ }}</label>-->
			<input name="password" type="password" id="resetPassword" placeholder="{{ 'Enter a new password'|_ }}">
		</div>
	</div>

	<div class="text-center mt-1">
		<button type="submit" class="btn btn-primary fluid">{{ 'Reset password'|_ }}</button>
		<a class="btn btn-link" href="/login">{{ 'Return to login'|_ }}</a>
	</div>
</form>
