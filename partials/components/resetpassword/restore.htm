<form
		class="ui form"
		method="post"
		data-request="onRestorePassword"
		data-request-success="alert('{{ 'Password reset request has been sent. Please check you email!'|_ }}');"
        data-request-redirect="/login"
		>
	<div class="field">
<!--		<label for="userRestoreEmail">{{ 'Email'|_ }}</label>-->
		<input name="email" type="email" id="userRestoreEmail" placeholder="{{ 'Enter your email'|_ }}">
	</div>

	<div class="mt-1 text-center">
		<button type="submit" class="btn btn-primary fluid">{{ 'Restore password'|_ }}</button>
	</div>

	<div class="text-center mt-1">
		<a class="btn btn-link" href="/login">{{ 'Return to login'|_ }}</a>

	</div>
</form>
