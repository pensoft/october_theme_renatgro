[localePicker]
forceUrl = 0
==

<nav id="headernavbar" role="navigation" aria-label="Primary">
    <a href="{{'home'|page}}" class="navbar-brand" aria-label="Home" title="Home">
        {% if this.theme.site_logo %}
            <img src="{{ this.theme.site_logo.getPath() }}" alt="{{ this.theme.site_name }}" class="logo-img">
        {% endif %}
    </a>

    <div class="navbar-right">
        <div class="lang-flags">
            <a href="{{ this.page.url|localeUrl('es') }}" class="flag-circle" title="Español">
                <span class="flag-icon flag-icon-es"></span>
            </a>
            <a href="{{ this.page.url|localeUrl('en') }}" class="flag-circle" title="English">
                <span class="flag-icon flag-icon-gb"></span>
            </a>
        </div>
        <div class="coming-soon-badge">
            <span>{{ 'Website coming soon!'|_ }}</span>
        </div>
    </div>
</nav>

{% if this.page.id != 'home' %}
<div class="header-image {{page_id}}">
    <div class="container">
        <h1 class="underline white">
            {% if page_title %} {{ page_title|_ }} {% else %} {{ site_name }} {% endif %}
        </h1>
    </div>
</div>
{% endif %}
